<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시나리오 서고</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="desktop">

  <!-- 브랜드 창 -->
  <div class="window browser-window">
    <div class="titlebar">
      <div class="dots"><span></span><span></span><span></span></div>
      <div class="titlebar-label" id="windowTitle">시나리오 서고.exe</div>
      <div class="titlebar-icons">- □ x</div>
    </div>
    <div class="addressbar">
      <span class="pill" id="addressBar">local://trpg-library/index.html</span>
    </div>
    <div class="brand-body">
      <div>
        <p class="brand-title" id="brandTitle">시나리오 서고</p>
        <p class="brand-sub" id="brandSub">저는 좋아하는 캐릭터한테는 송충이 줄 겁니다</p>
      </div>
      <div class="stat-chip">총 <b id="statTotal">0</b>개 저장됨</div>
    </div>
  </div>

  <!-- 필터 패널 -->
  <div class="window panel-window">
    <div class="titlebar">
      <div class="dots"><span></span><span></span><span></span></div>
      <div class="titlebar-label">filter.exe</div>
      <div class="titlebar-icons">- □ x</div>
    </div>
    <div class="panel-body">

      <div class="panel-row">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="제목으로 검색...">
        </div>
        <span class="field-label">정렬</span>
        <select id="sortSelect">
          <option value="recent">최근 추가순</option>
          <option value="title">제목 가나다순</option>
          <option value="metric-desc" id="sortMetricOpt">인원 많은순</option>
        </select>
        <button class="clear-filters" id="clearFilters">필터 초기화</button>
      </div>

      <div class="panel-row">
        <span class="field-label" style="margin-top:6px;">태그<br><span style="font-weight:400;color:#AAB3DD;">1번=포함<br>2번=제외</span></span>
        <div class="tag-cloud" id="tagCloud"></div>
      </div>

    </div>
  </div>

  <!-- 목록 창 -->
  <div class="window list-window">
    <div class="titlebar">
      <div class="dots"><span></span><span></span><span></span></div>
      <div class="titlebar-label">list_view.exe</div>
      <div class="titlebar-icons">- □ x</div>
    </div>
    <div class="list-toolbar">
      <span id="resultCount">0개 중 0~0 표시</span>
      <span>행을 클릭하면 시나리오 설명이 펼쳐져요</span>
    </div>
    <div class="list-scroll">
      <table>
        <thead>
          <tr id="theadRow">
            <th data-key="title">제목 <span class="arrow"></span></th>
            <th data-key="category" class="col-cat" id="thCategory">시스템 <span class="arrow"></span></th>
            <th data-key="extra" class="col-extra" id="thExtra">인원 <span class="arrow"></span></th>
            <th>태그</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="empty-state" id="emptyState" style="display:none;">
        조건에 맞는 항목이 없어요. 필터를 조금 풀어볼까요?
      </div>
    </div>
    <div class="pagination-bar">
      <div class="page-size">
        페이지당
        <select id="pageSizeSelect">
          <option value="30">30개</option>
          <option value="50" selected>50개</option>
          <option value="100">100개</option>
          <option value="200">200개</option>
        </select>
      </div>
      <div class="page-nav" id="pageNav"></div>
    </div>
  </div>

  <!-- 작업표시줄 -->
  <div class="taskbar">
    <span class="start" id="taskbarStart">TRPG 서고</span>
    <div class="fill"></div>
    <span id="taskbarCount">표시 중 0 / 총 0개</span>
    <span class="clock" id="clock">11:11</span>
  </div>

</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>

</body>
</html>
